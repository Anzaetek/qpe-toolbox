name: Examples

on: [pull_request]

jobs:
  run-examples:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        python-version: "3.13"

    - name: Install the project
      run: uv sync --locked --group test

    - name: Run examples
      run: uv run pytest -n auto -vv --no-cov --durations=0 --durations-min=1 --color=yes ./tests/test_examples.py
