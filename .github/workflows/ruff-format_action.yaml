name: Format

on: [pull_request]

jobs:
  ruff-format:
    runs-on: ubuntu-slim
    steps:
    - uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        python-version: "3.13"

    - name: Install the project
      run: uv sync --locked --only-group={dev,lint}

    - name: format src
      run: uv run --no-sync ruff format

    # use pre-commit as task runner to activate venv for hook
    - name: format notebooks
      run: uv run --no-sync pre-commit run format-examples --all-files
