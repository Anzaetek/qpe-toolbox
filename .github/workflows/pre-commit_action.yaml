name: Lint - other

on: [pull_request]

jobs:
  pre-commit:
    runs-on: ubuntu-slim
    steps:
    - uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        python-version: "3.13"

    - name: Install the project
      run: uv sync --locked --only-group=lint

    - name: Run pre-commit
      run: SKIP=ruff-check,ruff-format,format-examples uv run --no-sync pre-commit run --all-files
