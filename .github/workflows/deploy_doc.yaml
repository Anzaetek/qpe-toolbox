name: Deploy documentation

on: [pull_request]

jobs:
  run-examples:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Update mirrors
      run: sudo apt update

    - name: Install LaTeX
      run: |
        sudo apt install -y texlive-base texlive-latex-base texlive-latex-extra\
          texlive-fonts-recommended cm-super dvipng

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        python-version: "3.13"

    - name: Install the project
      run: uv sync --locked --group docs

    - name: Run examples
      run: |
        export TQDM_DISABLE=1
        uv run jupytext examples/*py --to ../docs/source/customapi/tutorials//ipynb --execute --run-path examples

    - name: Copy figures
      run: cp -r examples/figures docs/source/customapi/tutorials

    - name: Build doc
      run: uv run sphinx-build -b html -W docs/source docs/build

    - name: Upload doc
      uses: actions/upload-artifact@v6
      with:
        name: built_doc_artifact
        path: docs/build
        if-no-files-found: error
        retention-days: 7
        overwrite: true
