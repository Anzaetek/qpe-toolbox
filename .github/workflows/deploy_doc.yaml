name: Deploy documentation daily

on:
  schedule:
    - cron: '0 1 * * *'   # 01:00 UTC
  workflow_dispatch:

jobs:
  check-if-main-changed:
    runs-on: ubuntu-slim
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: check
        run: |
          if git rev-list -n 1 --since="24 hours ago" origin/main | grep -q .; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "main changed: deploy documentation again"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "no change in main: keep current documentation"
          fi

  build:
    needs: check-if-main-changed
    if: needs.check-if-main-changed.outputs.has_changes == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Install the project
        run: uv sync --locked --no-default-groups --group={docs,examples}

      # // is fine here, this is jupytext syntax
      - name: Run examples
        run: |
          export TQDM_DISABLE=1
          uv run --no-sync jupytext examples/*py --to ../docs/source/customapi/tutorials//ipynb --execute --run-path examples

      - name: Copy figures
        run: cp -r examples/figures docs/source/customapi/tutorials

      - name: Build doc
        run: uv run --no-sync sphinx-build -b html -W docs/source docs/build

      - name: Upload doc
        id: deployment
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/build

  deploy:
    needs: build
    if: needs.build.result == 'success'

    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an appropriate source

    # Deploy to the github-pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    # Specify runner + deployment step
    runs-on: ubuntu-slim
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
